<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Translated Component</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .header, .footer {
      background-color: #f0f0f0;
      padding: 10px 20px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .footer {
      border-top: 1px solid #ddd;
      justify-content: space-between;
      align-items: center;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .main h1 {
      font-size: 2rem;
      font-weight: bold;
      text-align: center;
    }
    .main .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .main .buttons a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      border-radius: 5px;
      text-decoration: none;
      font-size: 1rem;
    }
    .button-primary {
      background-color: #007bff;
      color: #fff;
      border: none;
    }
    .button-secondary {
      background-color: #fff;
      color: #000;
      border: 1px solid #ddd;
    }
    .button-secondary:hover {
      background-color: #f0f0f0;
    }
    .icon {
      width: 16px;
      height: 16px;
      margin-right: 5px;
    }
    .text-muted {
      color: #6c757d;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="#" class="inline-flex items-center">
        <img src="globe-icon.svg" alt="Globe Icon" class="icon">
        English
      </a>
      <a href="#" class="inline-flex items-center">
        <img src="globe-icon.svg" alt="Globe Icon" class="icon">
        Español
      </a>
    </div>
    <div class="main">
      <h1>Bienvenido a nuestra aplicación</h1>
      <div class="buttons">
        <a href="#" class="button-primary">Empezar</a>
        <a href="#" class="button-secondary">Aprender más</a>
      </div>
    </div>
    <div class="footer">
      <p class="text-muted">&copy; 2024 Acme Inc. All rights reserved.</p>
      <a href="#" class="inline-flex items-center">
        <img src="arrow-right-icon.svg" alt="Arrow Right Icon" class="icon">
        Ir a la página principal
      </a>
    </div>
  </div>
</body>
</html>
