<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ePubFlow</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .banner, .footer {
            background-color: #f0f0f0;
            color: #000000;
            padding: 27px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .banner h1, .footer p {
            margin: 0;
        }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .main h1 {
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            margin: 0 0 20px;
        }
        .main a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1.3em 3em;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            font-weight: 500;
            color: #000;
            background-color: #fff;
            border: none;
            border-radius: 45px;
            box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease 0s;
            cursor: pointer;
            outline: none;
            text-decoration: none;
        }
        .main a:hover {
            background-color: #23c483;
            box-shadow: 0px 15px 20px rgba(46, 229, 157, 0.4);
            color: #fff;
            transform: translateY(-7px);
        }
        .main a:active {
            transform: translateY(-1px);
        }
        .text-muted {
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="banner">
          
            <a href="https://www.epubflow.com/" style="color: inherit; text-decoration: none">
              <h1>ePubFlow</h1>
            </a>
        </div>
        <div class="main">
            <h1>Download your file, happy reading!</h1>
            <a href="/download/{{ output_file }}?input_file={{ input_file }}">Download</a>
        </div>
        <div class="footer">
            <p class="text-muted">&copy; 2025 ePubFlow. All rights reserved.</p>
            <a href="https://www.epubflow.com/" style="color: inherit; text-decoration: none">
              Go to the main page
            </a>
        </div>
    </div>
</body>
</html>
