<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Upload EPUB File</title>
  </head>
  <body>
    <h1>Upload EPUB File</h1>
    <form method="post" enctype="multipart/form-data">
      <input type="file" name="file" accept=".epub">
      <button type="submit">Upload</button>
    </form>
  </body>
</html>
